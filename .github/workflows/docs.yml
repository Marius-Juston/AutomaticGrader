name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs —
# we want every push to publish, even if pages are queued.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            doxygen graphviz

      - name: Install MkDocs + plugins
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'mkdocs>=1.6' \
            'mkdocs-material>=9.5' \
            'mkdocstrings[python]>=0.26' \
            'pymdown-extensions>=10' \
            pyyaml

      - name: Lint workflow YAML
        run: |
          python -c "import yaml; [yaml.safe_load(open(f)) for f in ['.github/workflows/grade.reusable.yml', '.github/workflows/tests.yml', '.github/workflows/docs.yml']]"

      - name: Set up Node (for Mermaid parser validation)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Mermaid diagrams parse
        run: |
          set -euo pipefail
          # Spin up a throwaway npm project and run Mermaid's own parser
          # against every ```mermaid``` block in docs/. Catches syntax bugs
          # before they reach a browser where they'd render as red error
          # boxes ("Syntax error in text mermaid version X").
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --silent --no-fund --no-audit mermaid@10.9.5 jsdom
          cat > validate.mjs <<'JS'
          import fs from "node:fs";
          import path from "node:path";
          import { JSDOM } from "jsdom";
          const dom = new JSDOM("<!DOCTYPE html><html><body></body></html>");
          global.window = dom.window;
          global.document = dom.window.document;
          global.HTMLElement = dom.window.HTMLElement;
          const mermaid = (await import("mermaid")).default;
          mermaid.initialize({ startOnLoad: false });
          const repoRoot = process.argv[2];
          function* walk(dir) {
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) yield* walk(p);
              else if (e.name.endsWith(".md")) yield p;
            }
          }
          let total = 0, failed = 0;
          for (const file of walk(path.join(repoRoot, "docs"))) {
            const md = fs.readFileSync(file, "utf8");
            const re = /```mermaid\n([\s\S]*?)\n```/g;
            let m;
            while ((m = re.exec(md)) !== null) {
              total++;
              const lineNo = md.slice(0, m.index).split("\n").length;
              try {
                await mermaid.parse(m[1]);
              } catch (err) {
                failed++;
                console.error(
                  `FAIL ${path.relative(repoRoot, file)}:${lineNo}\n` +
                  `     ${(err && err.message) || err}`
                );
              }
            }
          }
          console.log(`${total - failed}/${total} diagrams parse cleanly`);
          process.exit(failed === 0 ? 0 : 1);
          JS
          node validate.mjs "$GITHUB_WORKSPACE"

      - name: Generate Doxygen C++ API reference
        run: |
          set -euo pipefail
          doxygen --version
          # Run Doxygen and tee both streams so failures show up in logs.
          doxygen Doxyfile 2>&1 | tee doxygen.log
          echo "--- doxygen-out tree ---"
          ls -la doxygen-out/ \
            || { echo "ERROR: doxygen produced no output dir" >&2; exit 1; }
          test -f doxygen-out/html/index.html \
            || { echo "ERROR: doxygen-out/html/index.html missing" >&2; exit 1; }
          # Count HTML files — empty output is a silent failure mode.
          # `find -print0 | wc -l` would miscount on filenames with newlines;
          # using -printf '.' avoids both that and the SIGPIPE/pipefail trap
          # that `ls | head` hits when the dir has many files.
          n=$(find doxygen-out/html -maxdepth 1 -name '*.html' -printf '.' | wc -c)
          echo "doxygen produced $n HTML files"
          test "$n" -gt 5 \
            || { echo "ERROR: doxygen produced only $n HTML files (expected many)" >&2; exit 1; }
          # Sample a few filenames for the log without piping through `head`
          # (which closes stdin after N lines and EPIPEs `ls`/`find` under pipefail).
          echo "--- sample files ---"
          for f in $(find doxygen-out/html -maxdepth 1 -name '*.html' | sort | sed -n '1,20p'); do
            echo "  $f"
          done

      - name: Build MkDocs site (strict)
        run: |
          set -euo pipefail
          mkdocs build --strict
          test -f site/index.html
          # Confirm Mermaid + Material icons are wired into the rendered HTML.
          grep -q 'mermaid.min.js' site/index.html \
            || { echo "ERROR: Mermaid JS not loaded in site/index.html" >&2; exit 1; }
          grep -q 'class="mermaid"' site/architecture/overview/index.html \
            || { echo "ERROR: Mermaid divs missing in overview page" >&2; exit 1; }
          grep -q 'twemoji\|material-icon\|rocket-launch\|arrow-right-circle' site/index.html \
            || echo "WARN: no Material icon SVGs detected in landing page"

      - name: Merge Doxygen output into site
        run: |
          set -euo pipefail
          mkdir -p site/api/cpp
          cp -a doxygen-out/html/. site/api/cpp/
          test -f site/api/cpp/index.html \
            || { echo "ERROR: site/api/cpp/index.html missing after merge" >&2; exit 1; }
          test -f site/index.html
          n=$(find site/api/cpp -name '*.html' | wc -l)
          echo "merged $n Doxygen HTML files under site/api/cpp/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Deploy only from master; PRs still build but skip publish.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs —
# we want every push to publish, even if pages are queued.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            doxygen graphviz

      - name: Install MkDocs + plugins
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'mkdocs>=1.6' \
            'mkdocs-material>=9.5' \
            'mkdocstrings[python]>=0.26' \
            'pymdown-extensions>=10' \
            pyyaml

      - name: Lint workflow YAML
        run: |
          python -c "import yaml; [yaml.safe_load(open(f)) for f in ['.github/workflows/grade.reusable.yml', '.github/workflows/tests.yml', '.github/workflows/docs.yml']]"

      - name: Generate Doxygen C++ API reference
        run: |
          doxygen Doxyfile
          test -d doxygen-out/html

      - name: Build MkDocs site (strict)
        run: |
          mkdocs build --strict

      - name: Merge Doxygen output into site
        run: |
          mkdir -p site/api/cpp
          cp -r doxygen-out/html/. site/api/cpp/
          # Sanity check.
          test -f site/api/cpp/index.html
          test -f site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Deploy only from master; PRs still build but skip publish.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Tests

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache libspdlog-dev libgtest-dev libgmock-dev

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-tests-${{ github.sha }}
          restore-keys: |
            ccache-tests-

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGRADER_BUILD_TESTS=ON

      - name: Build tests
        run: cmake --build build --target grader_tests -j

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: |
            build/Testing/**
            build/tests/**/*.log
          if-no-files-found: ignore

  selftest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache libspdlog-dev

      - name: Configure & build (HW1 default)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Run --selftest
        run: ./build/AutomaticGrader --selftest

  python-tools:
    # Covers the workflow-side Python: select_assignments.py (matrix /
    # duplicate-id slot derivation) and render_report.py (aggregate +
    # per-folder hyperlinks + commit traceability). These are what the
    # reusable grading workflow runs in production, so a regression here
    # would silently break the student-facing report.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Lint workflow YAML
        run: |
          python -c "import yaml, sys; yaml.safe_load(open('.github/workflows/grade.reusable.yml')); yaml.safe_load(open('.github/workflows/tests.yml'))"

      - name: select_assignments self-test
        run: python tools/select_assignments.py --self-test

      - name: Python unit tests
        run: python -m unittest discover -s tests/python -v

name: Tests

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache libspdlog-dev libgtest-dev libgmock-dev

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-tests-${{ github.sha }}
          restore-keys: |
            ccache-tests-

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGRADER_BUILD_TESTS=ON

      - name: Build tests
        run: cmake --build build --target grader_tests -j

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: |
            build/Testing/**
            build/tests/**/*.log
          if-no-files-found: ignore

  selftest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache libspdlog-dev

      - name: Configure & build (HW1 default)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Run --selftest
        run: ./build/AutomaticGrader --selftest
